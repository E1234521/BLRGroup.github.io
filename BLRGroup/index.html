<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BLR Construction | More Than Buildings</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        blrBlue: '#0A255C',
                        blrRed: '#D11A2A',
                        blrGreen: '#1E6B38'
                    }
                }
            }
        }
    </script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* Smooth transition for the mobile menu */
        #mobile-menu {
            transition: transform 0.3s ease-in-out;
        }
    </style>
</head>
<body class="bg-gray-100 font-sans overflow-x-hidden">

    <header id="main-header" class="fixed top-0 w-full z-50 transition-all duration-300 py-4 px-6 bg-white shadow-sm">
        <div class="max-w-[1400px] mx-auto flex justify-between items-center">
            
            <a href="#" class="flex items-center shrink-0">
                <img src="img/logo.png" alt="BLR Construction" class="h-10 md:h-12 w-auto object-contain">
            </a>

            <nav class="hidden lg:flex items-center space-x-10">
                <button class="group flex items-center text-[13px] font-bold text-blrBlue uppercase tracking-widest hover:text-blrRed transition">
                    About <i data-lucide="chevron-down" class="w-4 h-4 ml-1 text-gray-400 group-hover:text-blrRed transition"></i>
                </button>
                <button class="group flex items-center text-[13px] font-bold text-blrBlue uppercase tracking-widest hover:text-blrRed transition">
                    Markets <i data-lucide="chevron-down" class="w-4 h-4 ml-1 text-gray-400 group-hover:text-blrRed transition"></i>
                </button>
                <button class="group flex items-center text-[13px] font-bold text-blrBlue uppercase tracking-widest hover:text-blrRed transition">
                    Projects <i data-lucide="chevron-down" class="w-4 h-4 ml-1 text-gray-400 group-hover:text-blrRed transition"></i>
                </button>
                <button class="group flex items-center text-[13px] font-bold text-blrBlue uppercase tracking-widest hover:text-blrRed transition">
                    Expertise <i data-lucide="chevron-down" class="w-4 h-4 ml-1 text-gray-400 group-hover:text-blrRed transition"></i>
                </button>
                <button class="group flex items-center text-[13px] font-bold text-blrBlue uppercase tracking-widest hover:text-blrRed transition">
                    Careers <i data-lucide="chevron-down" class="w-4 h-4 ml-1 text-gray-400 group-hover:text-blrRed transition"></i>
                </button>

                <a href="#" class="bg-blrGreen text-white px-6 py-2.5 rounded font-bold text-[12px] uppercase tracking-widest hover:opacity-90 transition shadow-lg">
                    Join Our Team
                </a>
            </nav>

            <button id="menu-btn" class="lg:hidden text-blrBlue p-2">
                <i data-lucide="menu" class="w-8 h-8"></i>
            </button>
        </div>
    </header>

    <div id="mobile-menu" class="fixed inset-0 z-[60] bg-white translate-x-full lg:hidden">
        <div class="p-6">
            <div class="flex justify-between items-center mb-10">
                <img src="img/logo.png" alt="Logo" class="h-10 w-auto">
                <button id="close-btn" class="text-blrBlue">
                    <i data-lucide="x" class="w-8 h-8"></i>
                </button>
            </div>
            <nav class="flex flex-col space-y-6 text-center">
                <a href="#" class="text-xl font-bold text-blrBlue uppercase tracking-widest border-b pb-2">About</a>
                <a href="#" class="text-xl font-bold text-blrBlue uppercase tracking-widest border-b pb-2">Markets</a>
                <a href="#" class="text-xl font-bold text-blrBlue uppercase tracking-widest border-b pb-2">Projects</a>
                <a href="#" class="text-xl font-bold text-blrBlue uppercase tracking-widest border-b pb-2">Expertise</a>
                <a href="#" class="text-xl font-bold text-blrBlue uppercase tracking-widest border-b pb-2">Careers</a>
                <a href="#" class="bg-blrGreen text-white py-4 rounded-xl font-bold uppercase tracking-widest shadow-lg mt-4">Join Our Team</a>
            </nav>
        </div>
    </div>

    <section class="relative h-screen w-full flex items-center justify-center overflow-hidden">
        <div class="absolute inset-0 z-0">
            <img src="img/hero-bg-img.png" alt="Construction Site" class="w-full h-full object-cover">
            <div class="absolute inset-0 bg-black/50"></div> 
        </div>

        <div class="relative z-10 text-center px-6 flex flex-col items-center max-w-4xl">
            <div class="bg-white p-6 md:p-8 rounded-full shadow-2xl mb-6 md:mb-8 transform hover:scale-105 transition duration-500">
                <img src="img/logo.png" alt="BLR" class="h-16 md:h-32 w-auto object-contain">
            </div>

            <h1 class="text-white text-3xl sm:text-4xl md:text-7xl font-black tracking-tight leading-tight md:leading-none mb-4 drop-shadow-lg">
                BLR Construction. <br class="hidden md:block">
                <span class="text-white font-light italic text-2xl sm:text-3xl md:text-5xl">More than buildings.</span>
            </h1>

            <div class="absolute bottom-10 left-1/2 -translate-x-1/2 text-white flex flex-col items-center animate-bounce cursor-pointer">
                <span class="uppercase text-[10px] font-bold tracking-[.3em] mb-2">Continue</span>
                <i data-lucide="chevron-down" class="w-6 h-6"></i>
            </div>
        </div>
    </section>

    <section class="py-20 px-6 bg-white text-center">
        <h2 class="text-2xl md:text-3xl font-bold text-blrBlue uppercase tracking-tighter">Excellence in Every Frame</h2>
        <p class="text-gray-500 mt-4 max-w-xl mx-auto leading-relaxed">Providing comprehensive construction services across residential and commercial sectors.</p>
    </section>

    <script>
        lucide.createIcons();

        // Navbar scroll behavior
        window.addEventListener('scroll', () => {
            const header = document.getElementById('main-header');
            if (window.scrollY > 50) {
                header.classList.add('py-2', 'bg-white/95', 'backdrop-blur-sm');
                header.classList.remove('py-4');
            } else {
                header.classList.add('py-4');
                header.classList.remove('py-2', 'bg-white/95', 'backdrop-blur-sm');
            }
        });

        // Mobile Menu Logic
        const menuBtn = document.getElementById('menu-btn');
        const closeBtn = document.getElementById('close-btn');
        const mobileMenu = document.getElementById('mobile-menu');

        menuBtn.addEventListener('click', () => {
            mobileMenu.classList.remove('translate-x-full');
            document.body.style.overflow = 'hidden'; // Prevent background scrolling
        });

        closeBtn.addEventListener('click', () => {
            mobileMenu.classList.add('translate-x-full');
            document.body.style.overflow = '';
        });
    </script>
</body>
</html>
