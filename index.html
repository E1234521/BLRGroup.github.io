<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BLR Construction | More Than Buildings</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        blrBlue: '#0A255C',
                        blrRed: '#D11A2A',
                        blrGreen: '#1E6B38',
                        blrScroll: '#f8f5f2'
                    }
                }
            }
        }
    </script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        #mobile-menu {
            transition: transform 0.3s ease-in-out;
        }
        #nav-logo {
            transition: all 0.3s ease-in-out;
        }
    </style>
</head>
<body class="bg-gray-100 font-sans overflow-x-hidden">

    <header id="main-header" class="fixed top-0 w-full z-50 transition-all duration-300 py-4 px-6 bg-white shadow-sm">
        <div class="max-w-[1400px] mx-auto flex justify-between items-center">
            
            <a href="#" class="flex items-center shrink-0">
                <img src="logo.png" id="nav-logo" alt="BLR Construction" class="h-10 md:h-12 w-auto object-contain">
            </a>

            <nav class="hidden lg:flex items-center space-x-10">
                <button class="group flex items-center text-[13px] font-bold text-blrBlue uppercase tracking-widest hover:text-blrRed transition">
                    About <i data-lucide="chevron-down" class="w-4 h-4 ml-1 text-gray-400 group-hover:text-blrRed transition"></i>
                </button>
                <button class="group flex items-center text-[13px] font-bold text-blrBlue uppercase tracking-widest hover:text-blrRed transition">
                    Markets <i data-lucide="chevron-down" class="w-4 h-4 ml-1 text-gray-400 group-hover:text-blrRed transition"></i>
                </button>
                <button class="group flex items-center text-[13px] font-bold text-blrBlue uppercase tracking-widest hover:text-blrRed transition">
                    Projects <i data-lucide="chevron-down" class="w-4 h-4 ml-1 text-gray-400 group-hover:text-blrRed transition"></i>
                </button>
                <button class="group flex items-center text-[13px] font-bold text-blrBlue uppercase tracking-widest hover:text-blrRed transition">
                    Expertise <i data-lucide="chevron-down" class="w-4 h-4 ml-1 text-gray-400 group-hover:text-blrRed transition"></i>
                </button>
                <button class="group flex items-center text-[13px] font-bold text-blrBlue uppercase tracking-widest hover:text-blrRed transition">
                    Careers <i data-lucide="chevron-down" class="w-4 h-4 ml-1 text-gray-400 group-hover:text-blrRed transition"></i>
                </button>

                <a href="#" class="bg-blrBlue text-white px-6 py-2.5 rounded font-bold text-[12px] uppercase tracking-widest hover:opacity-90 transition shadow-lg">
                    Join Our Team
                </a>
            </nav>

            <button id="menu-btn" class="lg:hidden text-blrBlue p-2">
                <i data-lucide="menu" class="w-8 h-8"></i>
            </button>
        </div>
    </header>

    <div id="mobile-menu" class="fixed inset-0 z-[60] bg-white translate-x-full lg:hidden">
        <div class="p-6">
            <div class="flex justify-between items-center mb-10">
                <img src="logo.png" alt="Logo" class="h-10 w-auto">
                <button id="close-btn" class="text-blrBlue">
                    <i data-lucide="x" class="w-8 h-8"></i>
                </button>
            </div>
            <nav class="flex flex-col space-y-6 text-center">
                <a href="#" class="text-xl font-bold text-blrBlue uppercase tracking-widest border-b pb-2">About</a>
                <a href="#" class="text-xl font-bold text-blrBlue uppercase tracking-widest border-b pb-2">Markets</a>
                <a href="#" class="text-xl font-bold text-blrBlue uppercase tracking-widest border-b pb-2">Projects</a>
                <a href="#" class="text-xl font-bold text-blrBlue uppercase tracking-widest border-b pb-2">Expertise</a>
                <a href="#" class="text-xl font-bold text-blrBlue uppercase tracking-widest border-b pb-2">Careers</a>
                <a href="#" class="bg-blrGreen text-white py-4 rounded-xl font-bold uppercase tracking-widest shadow-lg mt-4">Join Our Team</a>
            </nav>
        </div>
    </div>

    <section class="relative h-screen w-full flex items-center justify-center overflow-hidden">
        <div class="absolute inset-0 z-0">
            <img src="hero-bg-img.png" alt="Construction Site" class="w-full h-full object-cover">
            <div class="absolute inset-0 bg-black/50"></div> 
        </div>
        <div class="relative z-10 text-center px-6 flex flex-col items-center max-w-4xl">
            <div class="bg-white p-6 md:p-8 rounded-full shadow-2xl mb-6 md:mb-8 transform hover:scale-105 transition duration-500">
                <img src="logo.png" alt="BLR" class="h-16 md:h-32 w-auto object-contain">
            </div>
            <h1 class="text-white text-3xl sm:text-4xl md:text-7xl font-black tracking-tight leading-tight md:leading-none mb-4 drop-shadow-lg">
                BLR Construction. <br class="hidden md:block">
                <span class="text-white font-light italic text-2xl sm:text-3xl md:text-5xl">More than buildings.</span>
            </h1>
        </div>
        <div class="absolute bottom-10 left-0 right-0 flex flex-col items-center justify-center text-white animate-bounce cursor-pointer z-20">
            <span class="uppercase text-[10px] font-bold tracking-[.3em] mb-2">Continue</span>
            <i data-lucide="chevron-down" class="w-6 h-6"></i>
        </div>
    </section>

    <section id="stats-section" class="py-20 bg-blrBlue text-white">
        <div class="max-w-6xl mx-auto px-6">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-12 text-center">
                
                <div class="flex flex-col items-center">
                    <div id="star-container" class="flex space-x-1 mb-4 text-yellow-400 w-0 overflow-hidden transition-all duration-1000 ease-out">
                        <i data-lucide="star" class="w-8 h-8 fill-yellow-400"></i>
                        <i data-lucide="star" class="w-8 h-8 fill-yellow-400"></i>
                        <i data-lucide="star" class="w-8 h-8 fill-yellow-400"></i>
                        <i data-lucide="star" class="w-8 h-8 fill-yellow-400"></i>
                        <i data-lucide="star" class="w-8 h-8 fill-yellow-400"></i>
                    </div>
                    <span class="text-4xl font-black mb-2">5.0</span>
                    <p class="text-blue-200 uppercase tracking-widest text-xs font-bold">Average Rating</p>
                </div>

                <div class="flex flex-col items-center">
                    <div class="text-6xl font-black text-white mb-2 flex">
                        <span class="counter" data-target="94">0</span>%
                    </div>
                    <p class="text-blue-200 uppercase tracking-widest text-xs font-bold">Repeat Clients</p>
                </div>

                <div class="flex flex-col items-center">
                    <div class="text-6xl font-black text-white mb-2 flex">
                        <span class="counter" data-target="1250">0</span>+
                    </div>
                    <p class="text-blue-200 uppercase tracking-widest text-xs font-bold">Projects Completed</p>
                </div>

            </div>
        </div>
    </section>

    <script>
        lucide.createIcons();

        // Updated Navbar Scroll Logic: Color remains bg-white
        window.addEventListener('scroll', () => {
            const header = document.getElementById('main-header');
            const logo = document.getElementById('nav-logo');
            
            if (window.scrollY > 50) {
                // Background stays white, only adjust size and shadow
                header.classList.remove('py-4', 'shadow-sm');
                header.classList.add('py-2', 'shadow-md');
                logo.classList.add('scale-90');
            } else {
                header.classList.remove('py-2', 'shadow-md');
                header.classList.add('py-4', 'shadow-sm');
                logo.classList.remove('scale-90');
            }
        });

        // Mobile Menu Logic
        const menuBtn = document.getElementById('menu-btn');
        const closeBtn = document.getElementById('close-btn');
        const mobileMenu = document.getElementById('mobile-menu');
        menuBtn.addEventListener('click', () => {
            mobileMenu.classList.remove('translate-x-full');
            document.body.style.overflow = 'hidden';
        });
        closeBtn.addEventListener('click', () => {
            mobileMenu.classList.add('translate-x-full');
            document.body.style.overflow = '';
        });

        // Replayable Stats Animation Logic
        const statsSection = document.getElementById('stats-section');
        const starContainer = document.getElementById('star-container');
        const counters = document.querySelectorAll('.counter');

        const startAnimations = () => {
            starContainer.style.width = '168px'; 
            counters.forEach(counter => {
                const target = +counter.getAttribute('data-target');
                const updateCount = () => {
                    const count = +counter.innerText;
                    const speed = target / 50; 
                    if (count < target) {
                        counter.innerText = Math.ceil(count + speed);
                        setTimeout(updateCount, 20);
                    } else { 
                        counter.innerText = target; 
                    }
                };
                updateCount();
            });
        };

        const resetAnimations = () => {
            starContainer.style.width = '0px';
            counters.forEach(counter => {
                counter.innerText = '0';
            });
        };

        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if(entry.isIntersecting) {
                    startAnimations();
                } else {
                    resetAnimations();
                }
            });
        }, { threshold: 0.3 });

        if(statsSection) observer.observe(statsSection);
    </script>
</body>
</html>
